
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BattleOS - Tournament Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            medieval: ['MedievalSharp', 'cursive'],
          },
          colors: {
            app: {
              bg: 'var(--bg)',
              surface: 'var(--surface)',
              'surface-muted': 'var(--surface-muted)',
              text: 'var(--text)',
              'text-muted': 'var(--text-muted)',
              primary: 'var(--primary)',
              'primary-muted': 'var(--primary-muted)',
              border: 'var(--border)',
              accent: 'var(--accent)',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Shared values */
      --transition-speed: 0.3s;
    }

    /* Light Theme */
    [data-theme='light'] {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #0ea5e9;
      --primary-muted: rgba(14, 165, 233, 0.1);
      --border: #e2e8f0;
      --accent: #f59e0b;
    }

    /* Dark Theme */
    [data-theme='dark'] {
      --bg: #09090b;
      --surface: #18181b;
      --surface-muted: #27272a;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: #38bdf8;
      --primary-muted: rgba(56, 189, 248, 0.1);
      --border: #27272a;
      --accent: #fbbf24;
    }

    /* Midnight Blue Theme */
    [data-theme='midnight'] {
      --bg: #020617;
      --surface: #0f172a;
      --surface-muted: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #22d3ee;
      --primary-muted: rgba(34, 211, 238, 0.1);
      --border: #1e293b;
      --accent: #818cf8;
    }

    /* Forest Green Theme */
    [data-theme='forest'] {
      --bg: #022c22;
      --surface: #064e3b;
      --surface-muted: #065f46;
      --text: #ecfdf5;
      --text-muted: #6ee7b7;
      --primary: #10b981;
      --primary-muted: rgba(16, 185, 129, 0.1);
      --border: #065f46;
      --accent: #fcd34d;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color var(--transition-speed), color var(--transition-speed);
    }
    
    .font-medieval {
      font-family: 'MedievalSharp', cursive;
    }

    /* Scrollbar theming */
    ::-webkit-scrollbar {
      height: 8px;
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "mysql2/": "https://esm.sh/mysql2@^3.16.1/",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.5"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
